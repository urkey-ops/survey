<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kiosk Survey</title>

  <!-- PWA Meta Tags -->
  <meta name="description" content="Share your visit experience through our interactive kiosk survey">
  <meta name="theme-color" content="#E86000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kiosk Survey">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">

  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon-180x180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152x152.png">
  <link rel="apple-touch-icon" sizes="144x144" href="icons/icon-144x144.png">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="dist/output.css">
  <link rel="stylesheet" href="custom.css">

  <style>
    /* ── iOS kiosk hard lock ── */
    html, body {
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
    }

    /* Disable text-selection & callout everywhere except inputs */
    body, main, section, div {
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    /* Allow touch on video / start screen for iOS playback */
    #kioskStartScreen, #kioskVideo, video {
      touch-action: auto !important;
    }

    /* Allow text selection inside inputs */
    input, textarea, button, select {
      touch-action: manipulation;
      -webkit-user-select: text;
      font-size: 16px !important; /* prevent iOS auto-zoom */
    }

    /* ── Admin mode ── */
    .admin-active #mainTitle           { display: none !important; }
    .admin-active #adminControls       { width: 100% !important; justify-content: center !important; gap: 10px !important; }
    .admin-active header               { padding: 16px 24px !important; justify-content: center !important; }
    .admin-active #adminControls .flex { flex-wrap: wrap !important; justify-content: center !important; }
    .admin-active #adminControls button { min-width: 110px !important; padding: 10px 16px !important; }
  </style>
</head>

<body class="min-h-screen">

  <!--
    window.globals MUST be initialised before any module calls initializeElements().
    Without this, window.globals.kioskVideo = ... throws TypeError.
  -->
  <script>window.globals = {};</script>

  <!-- ═══════════════════════════════════════════════════════════════
       START SCREEN
       Full-screen black overlay with video loop.
       ═══════════════════════════════════════════════════════════════ -->
  <div id="kioskStartScreen" class="flex flex-col items-center justify-center">

    <div class="mb-8 content">
      <h2 class="text-3xl font-bold text-center text-white animate-pulse">
        Share Your Visit Experience
      </h2>
    </div>

    <video id="kioskVideo"
           class="max-w-xl max-h-full"
           autoplay
           muted
           playsinline
           webkit-playsinline
           preload="auto"
           disableRemotePlayback
           x-webkit-airplay="deny">
      <source src="asset/video/1.mp4" type="video/mp4">
    </video>

    <div class="mt-12 content">
      <p id="rotatingQuestion" class="tap-prompt text-xl text-white font-semibold text-center">
        Tap anywhere to begin
      </p>
    </div>

  </div>

  <!-- ═══════════════════════════════════════════════════════════════
       MAIN SURVEY
       Two white cards on grey page:
         Card 1 → header-card  (title + progress bar + admin)
         Card 2 → questionContainer (question + options)
       Buttons sit below Card 2 as a third visual zone.
       ═══════════════════════════════════════════════════════════════ -->
  <main class="hidden w-full flex-col">

    <!-- ── CARD 1: Header ── -->
    <header id="surveyHeader" class="w-full flex-shrink-0">
      <div class="header-card">

        <!-- Title row: "Share Your Thoughts" left, step counter right -->
        <div class="header-card__top">
          <button id="mainTitle"
                  aria-label="Survey title (tap 5× for admin)"
                  touch-action="manipulation">
            Share Your Visit Experience
          </button>
          <span id="stepCounter"
                aria-live="polite"
                aria-atomic="true">
          </span>
        </div>

        <!-- Progress bar — pill-shaped, contained inside card -->
        <div id="progressBarContainer"
             role="progressbar"
             aria-valuemin="0"
             aria-valuemax="100">
          <div id="progressBar"></div>
        </div>

        <!-- Admin panel — hidden by default, shown by 5-tap -->
        <div id="adminControls" class="hidden" aria-label="Admin panel">

          <!-- Row 1: unsynced count + status message -->
          <div class="flex items-center justify-between w-full">
            <p class="text-xs font-medium" style="color:#059669; margin:0;">
              Unsynced: <span id="unsyncedCountDisplay">0</span>
            </p>
            <span id="syncStatusMessage"
                  aria-live="polite"
                  class="text-xs font-medium"
                  style="color:#6B7280;">
            </span>
          </div>

          <!-- Row 2: action buttons -->
          <div class="flex items-center flex-wrap gap-1.5">
            <button id="syncButton">Sync Data</button>
            <button id="syncAnalyticsButton">Sync Analytics</button>
            <button id="adminClearButton">Clear Local</button>
            <button id="checkUpdateButton">Check Update</button>
            <button id="fixVideoButton">Fix Video</button>
            <button id="hideAdminButton">Hide</button>
          </div>

        </div>
      </div>
    </header>

    <!-- ── CARD 2: Question + Options ── -->
    <section id="surveyContent" aria-label="Survey question">

      <div id="questionContainer">
        <!-- JS renders question label + options here -->
      </div>

      <!-- Nav buttons — third zone, below Card 2 -->
      <div id="buttonContainer">
        <button id="prevBtn" type="button" aria-label="Previous question">Back</button>
        <button id="nextBtn" type="button" aria-label="Next question">Next</button>
      </div>

    </section>

  </main>

  <!-- ═══════════════════════════════════════════════════════════════
       GLOBAL ERROR BOUNDARY
       ═══════════════════════════════════════════════════════════════ -->
  <script>
    window.addEventListener('error', function(e) {
      console.error('🚨 [GLOBAL ERROR]', e.message, e.filename, e.lineno);
      try {
        if (window.dataHandlers && window.dataHandlers.recordAnalytics) {
          window.dataHandlers.recordAnalytics('app_error', {
            message: e.message, file: e.filename, line: e.lineno
          });
        }
      } catch (err) { console.error('Failed to log error:', err); }
      e.preventDefault();
      return true;
    });

    window.addEventListener('unhandledrejection', function(e) {
      console.error('🚨 [UNHANDLED PROMISE]', e.reason);
      try {
        if (window.dataHandlers && window.dataHandlers.recordAnalytics) {
          window.dataHandlers.recordAnalytics('promise_error', { reason: String(e.reason) });
        }
      } catch (err) { console.error('Failed to log promise error:', err); }
      e.preventDefault();
    });

    window.addEventListener('beforeunload', function() {
      console.log('[CLEANUP] Page unloading...');
      try {
        if (window.uiHandlers && window.uiHandlers.clearAllTimers) window.uiHandlers.clearAllTimers();
        if (window.videoPlaybackInterval) clearInterval(window.videoPlaybackInterval);
        const video = document.getElementById('kioskVideo');
        if (video) video.pause();
        console.log('[CLEANUP] ✅ Done');
      } catch (err) { console.error('[CLEANUP] Error:', err); }
    });
  </script>

  <!-- App scripts -->
  <script src="pwa-update-manager.js"></script>
  <script src="config.js"></script>
  <script src="appState.js"></script>
  <script src="data-util.js"></script>
  <script type="module" src="sync/dataSync.js"></script>
  <script type="module" src="uiHandlers.js"></script>
  <script type="module" src="main/index.js"></script>

  <!-- ═══════════════════════════════════════════════════════════════
       INLINE UTILITIES
       ═══════════════════════════════════════════════════════════════ -->
  <script>
    /* ── Checkmark / thank-you screen ── */
    window.showCheckmark = function() {
      const container = document.getElementById('questionContainer');
      if (!container) { console.error('[CHECKMARK] questionContainer not found'); return; }

      const wrap = document.createElement('div');
      wrap.className = 'checkmark-container';

      const circle = document.createElement('div');
      circle.className = 'checkmark-circle';

      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('class', 'checkmark-icon');
      svg.setAttribute('viewBox', '0 0 60 60');
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', 'M15 30 L25 40 L45 20');
      path.setAttribute('fill', 'none');
      svg.appendChild(path);
      circle.appendChild(svg);

      const text     = document.createElement('div');
      text.className = 'text-center';
      const heading  = document.createElement('h2');
      heading.className   = 'text-2xl font-bold text-gray-800 mb-2';
      heading.textContent = 'Thank you for your feedback!';
      const countdown     = document.createElement('p');
      countdown.id        = 'resetCountdown';
      countdown.className = 'text-gray-500 text-lg font-medium';
      countdown.textContent = 'Kiosk resetting in 5 seconds...';
      text.appendChild(heading);
      text.appendChild(countdown);

      wrap.appendChild(circle);
      wrap.appendChild(text);
      container.innerHTML = '';
      container.appendChild(wrap);
      console.log('[CHECKMARK] Displayed');
    };

    /* ── Prevent pinch-zoom gestures ── */
    document.addEventListener('gesturestart',  function(e) { e.preventDefault(); });
    document.addEventListener('gesturechange', function(e) { e.preventDefault(); });
    document.addEventListener('gestureend',    function(e) { e.preventDefault(); });

    /* ── Block double-tap zoom, allow header area ── */
    let lastTouchEnd = 0;
    document.addEventListener('touchend', function(e) {
      const t = e.target;
      if (t && (t.id === 'mainTitle' || t.closest('#mainTitle') || t.closest('header'))) return;
      const now = Date.now();
      if (now - lastTouchEnd <= 300) e.preventDefault();
      lastTouchEnd = now;
    }, false);

    document.addEventListener('touchmove', function(e) {
      const t = e.target;
      if (t && (t.id === 'mainTitle' || t.closest('#mainTitle') || t.closest('header'))) return;
      if (e.touches && e.touches.length > 1) e.preventDefault();
    }, { passive: false });

    /* ── Visual Viewport API: keyboard height → CSS var ──
       iOS keyboard overlays viewport; this tracks height so
       custom.css can push #buttonContainer above the keyboard. */
    if (window.visualViewport) {
      function updateKeyboardHeight() {
        const h = Math.max(
          0,
          window.innerHeight - window.visualViewport.height - window.visualViewport.offsetTop
        );
        document.documentElement.style.setProperty('--keyboard-height', h + 'px');
        if (h > 0) {
          const focused = document.activeElement;
          if (focused && (focused.tagName === 'TEXTAREA' || focused.tagName === 'INPUT')) {
            setTimeout(() => focused.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
          }
        }
      }
      window.visualViewport.addEventListener('resize', updateKeyboardHeight);
      window.visualViewport.addEventListener('scroll', updateKeyboardHeight);
    }
  </script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg  => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW failed:', err));
      });
    }
  </script>

</body>
</html>

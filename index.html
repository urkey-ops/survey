    <!-- Your Custom Styles -->
    <style>
/* Animation Styles */
@keyframes shake {
  0% { margin-left: 0px; }
  20% { margin-left: -8px; }
  40% { margin-left: 8px; }
  60% { margin-left: -8px; }
  80% { margin-left: 8px; }
  100% { margin-left: 0px; }
}

.shake { 
  animation: shake 0.6s ease-in-out !important; 
}

#kioskVideo.shake {
  animation: shake 0.6s ease-in-out !important;
}

/* iOS PWA Fullscreen Support */
:root {
    /* Safe area insets for notched devices */
    --safe-area-top: env(safe-area-inset-top);
    --safe-area-bottom: env(safe-area-inset-bottom);
    --safe-area-left: env(safe-area-inset-left);
    --safe-area-right: env(safe-area-inset-right);
}

body {
    /* Prevent overscroll bounce on iOS */
    overscroll-behavior: none;
    -webkit-overflow-scrolling: touch;
    
    /* Account for safe areas on notched devices */
    padding-top: var(--safe-area-top);
    padding-bottom: var(--safe-area-bottom);
    padding-left: var(--safe-area-left);
    padding-right: var(--safe-area-right);
}

/* Fullscreen mode adjustments */
body.standalone-mode {
    /* Hide scrollbars in fullscreen */
    overflow: hidden;
    
    /* Prevent text selection in kiosk mode */
    -webkit-user-select: none;
    user-select: none;
}

/* Prevent accidental zoom on double-tap */
button, input, textarea, a {
    touch-action: manipulation;
}

/* Disable callouts and context menus on iOS */
* {
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
}

/* Make touch targets at least 44x44 (Apple guideline) */
button, a, input[type="radio"], input[type="checkbox"] {
    min-width: 44px;
    min-height: 44px;
}

/* PWA install prompt (optional) */
.install-prompt {
    display: none;
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    padding: 15px 25px;
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    z-index: 10000;
    animation: slideUp 0.3s ease-out;
}

@keyframes slideUp {
    from {
        transform: translateX(-50%) translateY(100px);
        opacity: 0;
    }
    to {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
    }
}

.install-prompt.show {
    display: block;
}

<body class="min-h-screen flex items-center justify-center p-4 sm:p-8">
    
    <!-- Optional: PWA Install Prompt -->
    <div class="install-prompt" id="installPrompt">
        <p style="margin: 0 0 10px 0; font-weight: 600; color: #333;">Install Survey Kiosk</p>
        <p style="margin: 0 0 15px 0; font-size: 14px; color: #666;">Add to home screen for the best experience</p>
        <div style="display: flex; gap: 10px;">
            <button onclick="installPWA()" style="padding: 8px 20px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: 600;">Install</button>
            <button onclick="dismissInstallPrompt()" style="padding: 8px 20px; background: #e5e7eb; color: #333; border: none; border-radius: 5px; cursor: pointer;">Not Now</button>
        </div>
    </div>
    
    <!-- Start Screen -->
    <div id="kioskStartScreen" class="flex flex-col items-center justify-center">
        <video id="kioskVideo" class="max-w-xl max-h-full" autoplay muted loop playsinline webkit-playsinline>
            <source src="asset/video/1.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div class="mt-12">
            <p id="rotatingQuestion" class="tap-prompt text-xl">Tap anywhere to begin</p>
        </div>
    </div>
    
    <!-- Main Survey Content -->
    <main class="w-full max-w-2xl overflow-hidden min-h-[500px] flex flex-col">
        
        <header class="py-5 px-6 flex justify-between items-center relative">
            <h1 id="mainTitle" class="cursor-pointer">Share Your Visit Experience</h1>
            
            <div id="adminControls" class="flex flex-col items-end space-y-2">
                <p class="text-xs font-medium text-emerald-600">Unsynced Records: <span id="unsyncedCountDisplay">0</span></p>
                
                <div class="flex items-center space-x-2">
                    <span id="syncStatusMessage" class="text-xs font-medium text-neutral-600"></span> 
                    
                    <button id="syncButton">Sync Data</button>
                    <button id="syncAnalyticsButton">Sync Analytics</button>
                    <button id="adminClearButton">Clear Local</button>
                    <button id="hideAdminButton">Hide</button>
                </div>
            </div>
            
            <div class="absolute inset-x-0 bottom-0">
                <div id="progressBarContainer" class="w-full">
                    <div id="progressBar" class="h-full" style="width: 0;"></div>
                </div>
            </div>
        </header>
        
        <section id="surveyContent" class="p-8 flex-1 flex flex-col justify-center">
            <div id="questionContainer" class="flex-1 flex flex-col justify-center"></div>
            
            <div id="buttonContainer" class="flex justify-between items-center pt-6">
                <button id="prevBtn" type="button" class="px-6 py-2.5">Back</button>
                <button id="nextBtn" type="button" class="px-6 py-2.5">Next</button>
            </div>
        </section>
    </main>

    <!-- PWA SERVICE WORKER REGISTRATION -->
    <!-- ═══════════════════════════════════════════════════════════ -->
    <script>
        // Check if running as installed PWA
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || 
                            window.navigator.standalone === true;
        
        if (isStandalone) {
            console.log('[PWA] Running as installed app');
            document.body.classList.add('standalone-mode');
        } else {
            console.log('[PWA] Running in browser');
        }
        
        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then((registration) => {
                        console.log('[PWA] Service Worker registered successfully:', registration.scope);
                        
                        // Check for updates every hour
                        setInterval(() => {
                            registration.update();
                            console.log('[PWA] Checking for updates...');
                        }, 3600000); // 1 hour
                        
                        // Listen for updates
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            console.log('[PWA] New service worker found');
                            
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    console.log('[PWA] New version available');
                                    // Optionally show update notification
                                    if (confirm('New version available! Reload to update?')) {
                                        window.location.reload();
                                    }
                                }
                            });
                        });
                    })
                    .catch((error) => {
                        console.error('[PWA] Service Worker registration failed:', error);
                    });
            });

            // Listen for messages from service worker
            navigator.serviceWorker.addEventListener('message', (event) => {
                console.log('[PWA] Message from service worker:', event.data);
                
                if (event.data.type === 'BACKGROUND_SYNC') {
                    console.log('[PWA] Background sync requested');
                    if (window.dataHandlers && window.dataHandlers.autoSync) {
                        window.dataHandlers.autoSync();
                    }
                }
            });
            
            // Handle service worker updates
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                console.log('[PWA] Service worker controller changed - reloading');
                window.location.reload();
            });
        } else {
            console.warn('[PWA] Service Workers not supported in this browser');
        }

        // PWA Install Prompt Handler
        let deferredPrompt;
        
        window.addEventListener('beforeinstallprompt', (e) => {
            console.log('[PWA] Install prompt available');
            e.preventDefault();
            deferredPrompt = e;
            
            // Show custom install prompt (optional)
            // Only show if not already installed
            if (!isStandalone) {
                setTimeout(() => {
                    const installPrompt = document.getElementById('installPrompt');
                    if (installPrompt) {
                        installPrompt.classList.add('show');
                    }
                }, 5000); // Show after 5 seconds
            }
        });
        
        // Install PWA function
        function installPWA() {
            if (!deferredPrompt) {
                console.log('[PWA] Install prompt not available');
                return;
            }
            
            deferredPrompt.prompt();
            
            deferredPrompt.userChoice.then((choiceResult) => {
                if (choiceResult.outcome === 'accepted') {
                    console.log('[PWA] User accepted install');
                } else {
                    console.log('[PWA] User dismissed install');
                }
                deferredPrompt = null;
                dismissInstallPrompt();
            });
        }
        
        // Dismiss install prompt
        function dismissInstallPrompt() {
            const installPrompt = document.getElementById('installPrompt');
            if (installPrompt) {
                installPrompt.classList.remove('show');
            }
        }
        
        // Handle successful installation
        window.addEventListener('appinstalled', () => {
            console.log('[PWA] App installed successfully');
            dismissInstallPrompt();
            deferredPrompt = null;
        });
        
        // Online/Offline detection
        window.addEventListener('online', () => {
            console.log('[PWA] Connection restored');
            // Trigger sync if needed
            if (window.dataHandlers && window.dataHandlers.autoSync) {
                window.dataHandlers.autoSync();
            }
        });
        
        window.addEventListener('offline', () => {
            console.log('[PWA] Connection lost - entering offline mode');
        });
        
        // Log initial online status
        console.log('[PWA] Online status:', navigator.onLine ? 'Online' : 'Offline');
    </script>
